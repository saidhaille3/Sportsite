<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE | The Lithouse Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@mux/mux-player"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .ios-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="p-6 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
            <span class="font-black uppercase tracking-tighter text-xl">Lithouse <span class="text-red-600">Live</span></span>
        </div>
        <a href="index.html" class="text-[10px] font-black uppercase tracking-widest opacity-50 hover:opacity-100">← Back to Home</a>
    </nav>

    <main class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 p-6">
        
        <div class="lg:col-span-8 space-y-6">
            <div class="relative rounded-[2.5rem] overflow-hidden bg-black shadow-2xl border border-white/5">
<mux-player
    stream-type="live"
    playback-id="PASTE_YOUR_PLAYBACK_ID_HERE"
    metadata-video-title="The Lithouse Lounge"
    primary-color="#DC2626"
    autoplay
    class="w-full aspect-video">
</mux-player>
            </div>

            <div class="p-8 ios-glass rounded-[2.5rem]">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="bg-red-600 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Live Now</span>
                        <h1 class="text-4xl font-black uppercase tracking-tighter mt-4">The Lithouse Lounge: Trade Deadline Special</h1>
                        <p class="text-white/50 mt-2 font-medium">Reacting to the Ja'Marr Chase news and taking your questions live.</p>
                    </div>
                    <div class="flex gap-4">
                        <div class="text-center">
                            <p class="text-2xl font-black">1.2k</p>
                            <p class="text-[9px] font-bold text-white/30 uppercase">Watching</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 h-[600px] lg:h-[calc(100vh-160px)] flex flex-col ios-glass rounded-[2.5rem] overflow-hidden border border-white/10">
            <div class="p-6 border-b border-white/10 bg-white/5">
                <h2 class="text-xs font-black uppercase tracking-widest">Live Chat</h2>
            </div>

            <div id="chat-container" class="flex-grow overflow-y-auto p-6 space-y-4 no-scrollbar">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-red-600 uppercase">System</span>
                    <p class="text-sm text-white/80">Welcome to the pit. Keep it civil or get banned.</p>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-white/40 uppercase">HoopsFan_99</span>
                    <p class="text-sm text-white/90">Eagles are winning it all with Chase. No debate.</p>
                </div>
            </div>

            <div class="p-6 bg-white/5 border-t border-white/10">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="SAY SOMETHING..." 
                        class="flex-grow bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-xs font-bold text-white outline-none focus:border-red-600 transition-all">
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 rounded-xl text-[10px] font-black uppercase transition-all">
                        Send
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Simple Front-End Chat Logic
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatContainer = document.getElementById('chat-container');

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            if(!chatInput.value) return;

            const msg = document.createElement('div');
            msg.className = 'flex flex-col';
            msg.innerHTML = `
                <span class="text-[10px] font-black text-amber-500 uppercase">You</span>
                <p class="text-sm text-white/90">${chatInput.value}</p>
            `;
            chatContainer.appendChild(msg);
            chatInput.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };
    </script>
</body>
</html>
