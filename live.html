<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stream</title>
<script src="https://cdn.jsdelivr.net/npm/@mux/mux-player"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f7;
      --surface: #ffffff;
      --border: #e8e8e4;
      --text: #111110;
      --muted: #8a8a85;
      --accent: #111110;
      --live-red: #e63b2e;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
      text-decoration: none;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .status-pill.live {
      background: #fdf0ef;
      color: var(--live-red);
      border: 1px solid #f5c5c2;
    }

    .status-pill.offline {
      background: #f2f2f0;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-pill.live .status-dot {
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    /* ── Layout ── */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px;
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr;
      gap: 20px;
    }

    /* ── Player Section ── */
    .player-wrap {
      grid-column: 1;
      grid-row: 1 / 3;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .player-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #0c0c0b;
    }

    mux-player {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Offline overlay */
    .offline-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #0c0c0b;
      color: #555;
    }

    .offline-overlay.hidden { display: none; }

    .offline-icon {
      width: 48px;
      height: 48px;
      border: 1.5px solid #333;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .offline-icon svg { opacity: 0.4; }

    .offline-overlay p {
      font-size: 13px;
      color: #555;
      font-family: 'DM Mono', monospace;
    }

    /* Stream info bar */
    .stream-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-top: 1px solid var(--border);
    }

    .stream-title {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.2px;
    }

    .viewer-count {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

    .viewer-count svg { flex-shrink: 0; }

    /* ── Chat Section ── */
    .chat-wrap {
      grid-column: 2;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      height: calc(100vh - 130px);
      position: sticky;
      top: 76px;
    }

    .chat-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .chat-msg {
      display: flex;
      gap: 10px;
      animation: msgIn 0.2s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .chat-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      margin-top: 1px;
    }

    .chat-body {}
    .chat-name {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 2px;
      color: var(--text);
    }
    .chat-text {
      font-size: 13.5px;
      color: #3a3a38;
      line-height: 1.45;
    }

    .chat-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chat-footer input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 13.5px;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-footer input:focus {
      border-color: #bbb;
    }

    .chat-footer input::placeholder { color: #bbb; }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 7px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.75; }
    .send-btn:active { opacity: 0.6; }

    /* ── Username modal ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .modal-bg.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 360px;
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    .modal p {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .modal input:focus { border-color: #aaa; }

    .modal button {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .modal button:hover { opacity: 0.8; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .page {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        padding: 14px;
        gap: 14px;
      }

      .player-wrap { grid-column: 1; grid-row: 1; }
      .chat-wrap {
        grid-column: 1;
        grid-row: 2;
        height: 420px;
        position: static;
      }

      header { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<!-- Username Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>Join the stream</h2>
    <p>Enter a name to chat with everyone watching live.</p>
    <input type="text" id="nameInput" placeholder="Your name" maxlength="24" />
    <button onclick="setUsername()">Join chat</button>
  </div>
</div>

<!-- Header -->
<header>
  <a class="logo" href="#">YourBrand</a>
  <div class="status-pill offline" id="statusPill">
    <span class="status-dot"></span>
    <span id="statusText">Offline</span>
  </div>
</header>

<!-- Page -->
<div class="page">

  <!-- Player -->
  <div class="player-wrap">
    <div class="player-card">
      <div class="player-container">
        <!--
          SETUP: Replace YOUR_PLAYBACK_ID with your Mux playback ID.
          Get it from your Mux dashboard → Live Streams → Playback IDs.
        -->
        <mux-player
          id="muxPlayer"
          playback-id="TewjpLNLyv802huM3gVvXv4Nzs8XAUgdZXQ502NYQusmk"
          stream-type="live"
          autoplay="muted"
          muted
          style="display:none"
        ></mux-player>

        <div class="offline-overlay" id="offlineOverlay">
          <div class="offline-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
              <path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
              <line x1="3" y1="3" x2="21" y2="21" stroke="#666" stroke-width="1.5"/>
            </svg>
          </div>
          <p>Stream is offline</p>
        </div>
      </div>

      <div class="stream-info">
        <span class="stream-title" id="streamTitle">Waiting for stream…</span>
        <div class="viewer-count" id="viewerWrap" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span id="viewerCount">0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-wrap">
    <div class="chat-header">Live Chat</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-footer">
      <input
        type="text"
        id="chatInput"
        placeholder="Say something…"
        maxlength="200"
        onkeydown="if(event.key==='Enter') sendMsg()"
      />
      <button class="send-btn" onclick="sendMsg()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  // ─────────────────────────────────────────────
  //  CONFIG -- update these values
  // ─────────────────────────────────────────────
const CONFIG = {
  playbackId: 'TewjpLNLyv802huM3gVvXv4Nzs8XAUgdZXQ502NYQusmk',
  streamTitle: 'Live Stream',
  pollInterval: 8000,
  statusEndpoint: 'https://sportsite-79ty.onrender.com/api/stream-status',
};

// ── WebSocket real-time chat ──
const WS_URL = 'https://sportsite-79ty.onrender.com/api/stream-status';
let socket;

function connectWebSocket() {
  socket = new WebSocket(WS_URL);

  socket.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === 'chat') {
      addChatMsg(data.username, data.text);
    }

    if (data.type === 'history') {
      data.messages.forEach(m => addChatMsg(m.username, m.text));
    }

    if (data.type === 'viewers') {
      document.getElementById('viewerCount').textContent =
        data.count.toLocaleString();
    }
  };

  socket.onclose = () => {
    // Auto-reconnect after 3 seconds if connection drops
    setTimeout(connectWebSocket, 3000);
  };
}

connectWebSocket();

  // ─────────────────────────────────────────────
  //  State
  // ─────────────────────────────────────────────
  let username = '';
  let isLive = false;
  let viewerCount = 0;

  const AVATAR_COLORS = [
    '#3b82f6','#8b5cf6','#ec4899','#f97316',
    '#10b981','#ef4444','#f59e0b','#06b6d4'
  ];

  function colorFor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
    return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
  }

  // ─────────────────────────────────────────────
  //  Username modal
  // ─────────────────────────────────────────────
  function setUsername() {
    const val = document.getElementById('nameInput').value.trim();
    if (!val) return;
    username = val;
    document.getElementById('modalBg').classList.add('hidden');
    addSystemMsg(`${username} joined the stream`);
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') setUsername();
  });

  // ─────────────────────────────────────────────
  //  Chat
  // ─────────────────────────────────────────────
function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !username) return;
  // Don't call addChatMsg here -- the WS broadcast handles it
  input.value = '';
  fetch('https://sportsite-79ty.onrender.com/api/stream-status', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, text })
  });
}


  

  function addChatMsg(name, text) {
    const wrap = document.getElementById('chatMessages');
    const msg = document.createElement('div');
    msg.className = 'chat-msg';
    msg.innerHTML = `
      <div class="chat-avatar" style="background:${colorFor(name)}">${name[0].toUpperCase()}</div>
      <div class="chat-body">
        <div class="chat-name">${escHtml(name)}</div>
        <div class="chat-text">${escHtml(text)}</div>
      </div>`;
    wrap.appendChild(msg);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function addSystemMsg(text) {
    const wrap = document.getElementById('chatMessages');
    const msg = document.createElement('div');
    msg.style.cssText = 'font-size:11.5px;color:#aaa;text-align:center;font-family:DM Mono,monospace;padding:2px 0;';
    msg.textContent = text;
    wrap.appendChild(msg);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─────────────────────────────────────────────
  //  Stream status polling
  //  Replace this section with a real fetch() call
  //  to your Node backend once it's running.
  // ─────────────────────────────────────────────
  function updateStreamUI(live, viewers, title) {
    const pill   = document.getElementById('statusPill');
    const dot    = pill.querySelector('.status-dot');
    const label  = document.getElementById('statusText');
    const player = document.getElementById('muxPlayer');
    const overlay= document.getElementById('offlineOverlay');
    const vWrap  = document.getElementById('viewerWrap');
    const vCount = document.getElementById('viewerCount');
    const sTitle = document.getElementById('streamTitle');

    if (live && !isLive) {
      addSystemMsg('Stream started');
    } else if (!live && isLive) {
      addSystemMsg('Stream ended');
    }

    isLive = live;

    pill.className = 'status-pill ' + (live ? 'live' : 'offline');
    label.textContent = live ? 'Live' : 'Offline';
    player.style.display = live ? 'block' : 'none';
    overlay.classList.toggle('hidden', live);
    vWrap.style.display = live ? 'flex' : 'none';
    vCount.textContent = viewers.toLocaleString();
    sTitle.textContent = title || CONFIG.streamTitle;
  }

  async function pollStatus() {
    try {
      const res = await fetch(CONFIG.statusEndpoint);
      if (!res.ok) throw new Error();
      const data = await res.json();
      updateStreamUI(data.live, data.viewers || 0, data.title);
    } catch {
      // backend not connected yet -- show offline state silently
      updateStreamUI(false, 0, 'Waiting for stream…');
    }
  }

  // Initial state
  updateStreamUI(false, 0, 'Waiting for stream…');
  pollStatus();
  setInterval(pollStatus, CONFIG.pollInterval);

  // ─────────────────────────────────────────────
  //  Demo: simulate messages (remove when real chat is wired up)
  // ─────────────────────────────────────────────
  const demoMessages = [
    ['Alex', 'this is 🔥'],
    ['Jordan', 'been waiting for this one'],
    ['Sam', 'great quality!'],
    ['Riley', 'where can I find the link to join?'],
    ['Morgan', 'love the setup'],
  ];
  let demoIdx = 0;
  function demoChat() {
    if (demoIdx < demoMessages.length) {
      const [n, t] = demoMessages[demoIdx++];
      addChatMsg(n, t);
      setTimeout(demoChat, 2200 + Math.random() * 2000);
    }
  }
  setTimeout(demoChat, 1500);
</script>
</body>
</html>
