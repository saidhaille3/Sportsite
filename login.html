<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Lithouse | ACCESS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: white;
      overflow-y: auto;
      overflow-x: hidden;
    }
    
    .stadium-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 60, 0, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 153, 0, 0.08) 0%, transparent 50%),
        linear-gradient(to bottom, #000, #050505);
      z-index: -1;
    }

    .fire-glow {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 400px;
      height: 200px;
      background: #ff3c00;
      filter: blur(80px);
      opacity: 0.2;
      pointer-events: none;
    }
    
    .elite-card {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }
    
    .input-group input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 16px; 
    }
    
    .input-group input:focus {
      background: rgba(255, 255, 255, 0.07);
      border-color: #ff3c00;
      box-shadow: 0 0 20px rgba(255, 60, 0, 0.1);
    }
    
    .btn-fire {
      background: white;
      color: black;
      transition: all 0.3s ease;
    }
    
    .btn-fire:hover {
      background: #ff3c00;
      color: white;
      box-shadow: 0 0 30px rgba(255, 60, 0, 0.4);
    }

    .toggle-btn.active {
      color: white;
      background: rgba(255, 255, 255, 0.05);
    }

    .hidden-form {
      display: none;
    }

    @media (max-height: 700px) {
      body { align-items: flex-start; padding-top: 2rem; }
    }
  </style>
</head>

<body class="dark min-h-screen flex items-center justify-center p-4 sm:p-6">
  
  <div class="stadium-bg"></div>
  <div class="fire-glow"></div>
  
  <div class="w-full max-w-[460px] relative">
    <div class="mb-8 sm:mb-12 flex flex-col items-center">
      <img src="/images/logo1.webp" alt="Logo" class="h-10 w-auto mb-6 drop-shadow-[0_0_15px_rgba(255,60,0,0.3)]" />
      
      <div class="flex bg-white/5 p-1 rounded-2xl border border-white/10 w-full">
        <button id="loginToggle" onclick="showForm('login')" class="toggle-btn active flex-1 py-3 text-[10px] font-black uppercase tracking-[0.3em] rounded-xl transition-all">Login</button>
        <button id="signupToggle" onclick="showForm('signup')" class="toggle-btn flex-1 py-3 text-[10px] font-black uppercase tracking-[0.3em] rounded-xl transition-all text-white/40">Create Account</button>
      </div>
    </div>
    
    <div class="elite-card rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-10 relative overflow-hidden">
      <div id="loginForm" class="form-container">
        <div class="mb-8 text-center sm:text-left">
          <h1 class="text-3xl sm:text-4xl font-black uppercase tracking-tighter leading-none">Login</h1>
        </div>
        
        <form class="space-y-4">
          <div class="input-group">
            <label class="block text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 ml-1">Username</label>
            <input type="text" placeholder="EMAIL OR USERNAME" class="w-full rounded-xl px-5 py-4 text-sm font-bold text-white outline-none placeholder:text-white/10">
          </div>
          
          <div class="input-group">
            <label class="block text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 ml-1">Password</label>
            <input type="password" placeholder="••••••••" class="w-full rounded-xl px-5 py-4 text-sm font-bold text-white outline-none">
          </div>
          
          <div class="flex items-center justify-between pt-2">
            <label class="flex items-center gap-2 cursor-pointer group">
              <input type="checkbox" class="hidden checkbox-input">
              <div class="w-4 h-4 border border-white/20 rounded group-hover:border-orange-500 transition-all flex items-center justify-center">
                <div class="check-dot w-2 h-2 bg-orange-500 rounded-sm opacity-0 transition-opacity"></div>
              </div>
              <span class="text-[10px] font-bold uppercase tracking-widest text-white/30">Stay Logged In</span>
            </label>
            <a href="#" class="text-[10px] font-bold uppercase tracking-widest text-white/30 hover:text-orange-500">Forgot?</a>
          </div>
          
          <button class="w-full btn-fire py-5 rounded-xl font-black uppercase text-xs tracking-[0.3em] mt-4">Enter</button>
        </form>
      </div>

      <div id="signupForm" class="form-container hidden-form">
        <div class="mb-8 text-center sm:text-left">
          <h1 class="text-3xl sm:text-4xl font-black uppercase tracking-tighter leading-none">Become <br/><span class="text-white/20">A Member</span></h1>
        </div>
        
        <form class="space-y-4">
          <div class="input-group">
            <label class="block text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 ml-1">Display Name</label>
            <input type="text" placeholder="" class="w-full rounded-xl px-5 py-4 text-sm font-bold text-white outline-none placeholder:text-white/10">
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="input-group">
              <label class="block text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 ml-1">First Name</label>
              <input type="text" placeholder="" class="w-full rounded-xl px-5 py-4 text-sm font-bold text-white outline-none placeholder:text-white/10">
            </div>
            <div class="input-group">
              <label class="block text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 ml-1">Last Name</label>
              <input type="text" placeholder="" class="w-full rounded-xl px-5 py-4 text-sm font-bold text-white outline-none placeholder:text-white/10">
            </div>
          </div>

          <div class="input-group">
            <label class="block text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 ml-1">Email</label>
            <input type="email" class="w-full rounded-xl px-5 py-4 text-sm font-bold text-white outline-none placeholder:text-white/10">
          </div>
          
          <div class="input-group">
            <label class="block text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 ml-1">Password</label>
            <input type="password" placeholder="MIN 8 CHARACTERS" class="w-full rounded-xl px-5 py-4 text-sm font-bold text-white outline-none">
          </div>
          
          <button class="w-full btn-fire py-5 rounded-xl font-black uppercase text-xs tracking-[0.3em] mt-4">Join</button>
        </form>
      </div>

      <div class="mt-8 pt-6 border-t border-white/5">
        <button class="w-full bg-white/5 hover:bg-white/10 border border-white/5 py-4 rounded-xl flex items-center justify-center gap-3 transition-all group">
          <i class="fa-brands fa-google text-white/20 group-hover:text-white text-xs"></i>
          <span class="text-[9px] font-black uppercase tracking-widest text-white/40 group-hover:text-white">Quick Access</span>
        </button>
      </div>
    </div>
    
    <div class="my-8 flex justify-between items-center px-4">
      <span class="text-[9px] font-black uppercase tracking-[0.4em] text-white/10">© Lithouse 2026</span>
    </div>
  </div>
  
  <script>
    function showForm(type) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const loginToggle = document.getElementById('loginToggle');
      const signupToggle = document.getElementById('signupToggle');

      if (type === 'login') {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        loginToggle.classList.add('active', 'text-white');
        loginToggle.classList.remove('text-white/40');
        signupToggle.classList.remove('active', 'text-white');
        signupToggle.classList.add('text-white/40');
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        signupToggle.classList.add('active', 'text-white');
        signupToggle.classList.remove('text-white/40');
        loginToggle.classList.remove('active', 'text-white');
        loginToggle.classList.add('text-white/40');
      }
    }

    document.querySelectorAll('.group').forEach(label => {
      label.addEventListener('click', function() {
        const dot = this.querySelector('.check-dot');
        if(dot) dot.style.opacity = dot.style.opacity === '1' ? '0' : '1';
      });
    });
  </script>
</body>
</html>
