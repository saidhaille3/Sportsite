<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>The Lounge – Lithouse Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background 0.5s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .h-screen-safe { height: 100vh; height: 100dvh; }
        
        /* Glassmorphic User Icon Ring */
        .glass-ring {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 215, 0, 0.5);
        }

        /* Room Selection Vibes */
        .vibe-lobby { --vibe-glow: #f59e0b; }
        .vibe-nba { --vibe-glow: #1d428a; background-image: radial-gradient(circle at top right, rgba(29,66,138,0.1), transparent); }
        .vibe-nfl { --vibe-glow: #004c54; background-image: radial-gradient(circle at top right, rgba(0,76,84,0.15), transparent); }
        .vibe-boxing { --vibe-glow: #dc2626; background-image: radial-gradient(circle at top right, rgba(220,38,38,0.1), transparent); }

        .active-room-tab {
            color: white !important;
            opacity: 1 !important;
            border-bottom: 2px solid white;
        }

        .fire-text {
            background: linear-gradient(to bottom, #fff 20%, #ff9900 50%, #ff3c00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>

<body id="mainBody" class="bg-white dark:bg-[#0a0a0a] text-black dark:text-white overflow-hidden h-screen-safe flex flex-col vibe-lobby">

    <header class="flex-none p-4 border-b border-black/5 dark:border-white/5 flex items-center justify-between bg-white/80 dark:bg-black/80 backdrop-blur-xl z-[70]">
        <div class="flex items-center gap-2">
            <span class="fire-text text-xl font-black uppercase tracking-tighter">Lithouse Lounge</span>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="toggleUserList()" class="p-2 text-amber-500 bg-amber-500/10 rounded-xl">
                <i class="fa-solid fa-users-viewfinder text-sm"></i>
            </button>
            <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 opacity-50">
                <i class="fa-solid fa-moon"></i>
            </button>
            <div class="w-10 h-10 rounded-full glass-ring p-[2px] cursor-pointer relative" onclick="viewUser('MyProfile', 'https://i.pravatar.cc/150?u=me')">
                <div class="w-full h-full rounded-full bg-neutral-900 flex items-center justify-center overflow-hidden">
                    <img src="https://i.pravatar.cc/150?u=me" class="object-cover w-full h-full">
                </div>
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-black rounded-full"></span>
            </div>
        </div>
    </header>

    <nav class="flex-none bg-gray-50/50 dark:bg-white/5 border-b border-black/5 dark:border-white/5 overflow-x-auto no-scrollbar">
        <div class="flex items-center px-4 h-12 gap-8 min-w-max" id="roomTabContainer">
            <button onclick="switchRoom('lobby', this)" class="active-room-tab text-[10px] font-black uppercase tracking-[0.2em] opacity-40 hover:opacity-100 transition-all h-full border-b-2 border-transparent">Global Lobby</button>
            <button onclick="switchRoom('nba', this)" class="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 hover:opacity-100 transition-all h-full border-b-2 border-transparent">NBA Court</button>
            <button onclick="switchRoom('nfl', this)" class="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 hover:opacity-100 transition-all h-full border-b-2 border-transparent">Eagles Nest</button>
            <button onclick="switchRoom('boxing', this)" class="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 hover:opacity-100 transition-all h-full border-b-2 border-transparent">Boxing Ring</button>
            <button onclick="switchRoom('elite', this)" class="text-[10px] font-black uppercase tracking-[0.2em] text-amber-500 opacity-60 hover:opacity-100 transition-all h-full border-b-2 border-transparent">VIP Lounge</button>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden relative">
        <section class="flex-1 flex flex-col min-w-0 h-full relative">
            <div id="chatFeed" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 no-scrollbar">
                </div>

            <div class="flex-none p-4 md:p-6 bg-white dark:bg-[#0a0a0a] border-t border-black/5 dark:border-white/5">
                <form id="chatForm" onsubmit="sendMessage(event)" class="max-w-4xl mx-auto flex items-center gap-3">
                    <button type="button" class="w-12 h-12 flex-none rounded-2xl bg-amber-500 text-white flex items-center justify-center shadow-lg active:scale-90 transition hover:rotate-12">
                        <i class="fa-solid fa-gift"></i>
                    </button>
                    <div class="relative flex-1">
                        <input type="text" id="chatInput" autocomplete="off" placeholder="SAY SOMETHING..." class="w-full bg-gray-100 dark:bg-white/5 rounded-2xl py-4 px-6 text-[11px] font-black tracking-widest outline-none border-2 border-transparent focus:border-red-600 transition-all dark:text-white">
                        <button type="submit" class="absolute right-4 top-1/2 -translate-y-1/2 text-red-600 text-lg">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <div id="userListPanel" class="absolute inset-y-0 right-0 w-72 bg-white dark:bg-[#0d0d0d] z-[80] transform translate-x-full transition-transform duration-300 border-l border-black/5 dark:border-white/10 flex flex-col shadow-2xl">
            <div class="p-6 border-b border-black/5 dark:border-white/5 flex justify-between items-center">
                <h3 class="text-[10px] font-black uppercase tracking-widest opacity-40">In Room</h3>
                <button onclick="toggleUserList()" class="text-xl opacity-40">&times;</button>
            </div>
            <div id="roomUserList" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        </div>

        <div id="userProfile" class="absolute inset-y-0 right-0 w-full md:w-96 bg-white dark:bg-[#0a0a0a] z-[90] transform translate-x-full transition-transform duration-500 border-l border-black/5 dark:border-white/10 flex flex-col shadow-2xl">
            <div class="p-8 flex-1 overflow-y-auto no-scrollbar text-center">
                <button onclick="closeProfile()" class="text-3xl mb-4 opacity-30 flex">&times;</button>
                <div class="w-28 h-28 rounded-[2rem] bg-gradient-to-tr from-amber-500 to-yellow-200 p-1 mx-auto mb-4">
                    <img id="modalImg" src="" class="w-full h-full rounded-[1.8rem] object-cover">
                </div>
                <h2 id="modalName" class="text-2xl font-black uppercase tracking-tighter mb-1">---</h2>
                <div class="flex justify-center gap-2 mb-8">
                    <span class="bg-red-600/10 text-red-600 text-[8px] font-black px-2 py-1 rounded uppercase tracking-widest">Elite Member</span>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-8">
                    <button class="bg-black dark:bg-white text-white dark:text-black py-4 rounded-xl text-[9px] font-black uppercase tracking-widest active:scale-95 transition">Add Friend</button>
                    <button class="bg-gray-100 dark:bg-white/5 py-4 rounded-xl text-[9px] font-black uppercase tracking-widest active:scale-95 transition">Direct Message</button>
                </div>

                <div class="text-left">
                    <h4 class="text-[9px] font-black uppercase tracking-widest opacity-30 mb-4">Photos</h4>
                    <div class="grid grid-cols-3 gap-2" id="profileAlbum"></div>
                </div>
            </div>
            <div class="p-6 border-t border-black/5 dark:border-white/5">
                <button class="w-full bg-amber-500 py-4 rounded-xl text-white font-black text-[10px] uppercase tracking-widest shadow-lg">Send Virtual Gift</button>
            </div>
        </div>
    </main>

    <script>
        const roomData = {
            lobby: { 
                name: "Global Lobby", vibe: "lobby", 
                users: [{n: 'SportsFan_21', i: '22'}, {n: 'KingJames_Fan', i: '12'}],
                chats: [{u: 'SportsFan_21', t: 'Welcome to the main lobby! 💎', i: '22'}]
            },
            nba: { 
                name: "NBA Court", vibe: "nba", 
                users: [{n: 'Lakers4Life', i: '44'}, {n: 'Wemby_Styx', i: '33'}],
                chats: [{u: 'Lakers4Life', t: 'AD is dominating tonight! 🔥', i: '44'}]
            },
            nfl: { 
                name: "Eagles Nest", vibe: "nfl", 
                users: [{n: 'PhillySpecial', i: '55'}],
                chats: [{u: 'PhillySpecial', t: 'Go Birds!! 🦅', i: '55'}]
            },
            boxing: { 
                name: "Boxing Ring", vibe: "boxing", 
                users: [{n: 'IronMike', i: '88'}],
                chats: [{u: 'IronMike', t: 'The main event is about to start! 🥊', i: '88'}]
            }
        };

        function switchRoom(id, btn) {
            const data = roomData[id] || roomData.lobby;
            
            // UI Toggle logic
            document.querySelectorAll('#roomTabContainer button').forEach(b => b.classList.remove('active-room-tab'));
            btn.classList.add('active-room-tab');

            // Body vibe change
            document.getElementById('mainBody').className = `bg-white dark:bg-[#0a0a0a] text-black dark:text-white overflow-hidden h-screen-safe flex flex-col vibe-${data.vibe}`;
            
            // Update Feed
            const feed = document.getElementById('chatFeed');
            feed.innerHTML = '';
            data.chats.forEach(c => appendMessage(c.u, c.t, `https://i.pravatar.cc/150?u=${c.i}`));
            
            // Update User List
            const list = document.getElementById('roomUserList');
            list.innerHTML = '';
            data.users.forEach(u => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-2 rounded-xl hover:bg-white/5 cursor-pointer";
                div.onclick = () => viewUser(u.n, `https://i.pravatar.cc/150?u=${u.i}`);
                div.innerHTML = `<img src="https://i.pravatar.cc/150?u=${u.i}" class="w-8 h-8 rounded-lg"> <span class="text-xs font-bold">${u.n}</span>`;
                list.appendChild(div);
            });
            feed.scrollTop = feed.scrollHeight;
        }

        function appendMessage(user, text, img) {
            const feed = document.getElementById('chatFeed');
            const div = document.createElement('div');
            div.className = "flex gap-3 animate-in slide-in-from-left duration-300";
            div.innerHTML = `
                <img src="${img}" class="w-10 h-10 rounded-2xl cursor-pointer" onclick="viewUser('${user}', '${img}')">
                <div class="max-w-[80%] space-y-1">
                    <p class="text-[9px] font-black opacity-30 uppercase">${user}</p>
                    <div class="bg-gray-100 dark:bg-neutral-900 p-4 rounded-3xl rounded-tl-none shadow-sm text-sm font-medium">${text}</div>
                </div>`;
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
        }

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            if(!input.value) return;
            appendMessage('Me', input.value, 'https://i.pravatar.cc/150?u=me');
            input.value = '';
        }

        function toggleUserList() { document.getElementById('userListPanel').classList.toggle('translate-x-full'); }
        function viewUser(name, img) {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalImg').src = img;
            const album = document.getElementById('profileAlbum');
            album.innerHTML = '';
            for(let i=0; i<6; i++) album.innerHTML += `<div class="aspect-square bg-white/5 rounded-xl overflow-hidden"><img src="https://picsum.photos/200/200?random=${i}" class="w-full h-full object-cover"></div>`;
            document.getElementById('userProfile').classList.remove('translate-x-full');
        }
        function closeProfile() { document.getElementById('userProfile').classList.add('translate-x-full'); }

        window.onload = () => switchRoom('lobby', document.querySelector('#roomTabContainer button'));
    </script>
</body>
</html>
